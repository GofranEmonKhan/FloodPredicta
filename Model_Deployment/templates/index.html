<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #00b4db, #0083b0);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            margin-top: 20px;
            font-size: 2em;
        }
        form {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            width: 400px;
            margin-top: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            margin-top: 5px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            font-size: 1.2em;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>🌊 Flood Prediction System</h1>

    <form action="/predict" method="post">
        <label>Max Temperature</label>
        <input type="number" step="any" name="Max_Temp" required>

        <label>Min Temperature</label>
        <input type="number" step="any" name="Min_Temp" required>

        <label>Rainfall (log)</label>
        <input type="number" step="any" name="Rainfall" required>

        <label>Relative Humidity</label>
        <input type="number" step="any" name="Relative_Humidity" required>

        <label>Wind Speed (log)</label>
        <input type="number" step="any" name="Wind_Speed" required>

        <label>Cloud Coverage</label>
        <input type="number" step="any" name="Cloud_Coverage" required>

        <label>Bright Sunshine</label>
        <input type="number" step="any" name="Bright_Sunshine" required>

        <label>X_COR</label>
        <input type="number" step="any" name="X_COR" required>

        <label>Y_COR</label>
        <input type="number" step="any" name="Y_COR" required>

        <label>LATITUDE</label>
        <input type="number" step="any" name="LATITUDE" required>

        <label>LONGITUDE</label>
        <input type="number" step="any" name="LONGITUDE" required>

        <label>ALT (log)</label>
        <input type="number" step="any" name="ALT" required>

        <label>Period</label>
        <input type="number" step="any" name="Period" required>

        <label>Station Name</label>
        <select name="Station_Name" required>
            {% for station in stations %}
            <option value="{{ station }}">{{ station }}</option>
            {% endfor %}
        </select>

        <button type="submit">Predict Flood Risk</button>
    </form>

    {% if prediction %}
        <div class="result">
            <strong>{{ prediction }}</strong><br>
            Probability: {{ prob }}
        </div>
    {% endif %}
</body>
</html>
